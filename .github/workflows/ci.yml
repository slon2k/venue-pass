name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-CU25-ubuntu-22.04
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "YourStrong_Passw0rd"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong_Passw0rd -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    env:
      TEST_DB_CONNECTION_STRING: "Server=localhost,1433;Database=VenuePass_Tests;User Id=sa;Password=YourStrong_Passw0rd;TrustServerCertificate=True"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore VenuePass.slnx

      - name: Build
        run: dotnet build VenuePass.slnx --configuration Release --no-restore /warnaserror

      - name: Run tests (unit + architecture)
        run: |
          dotnet test tests/VenuePass.BuildingBlocks.Tests/VenuePass.BuildingBlocks.Tests.csproj --configuration Release --no-build
          dotnet test tests/VenuePass.Modules.Events.Tests/VenuePass.Modules.Events.Tests.csproj --configuration Release --no-build
          dotnet test tests/VenuePass.ArchitectureTests/VenuePass.ArchitectureTests.csproj --configuration Release --no-build

      - name: Run integration tests
        run: dotnet test tests/VenuePass.Modules.Events.IntegrationTests/VenuePass.Modules.Events.IntegrationTests.csproj --configuration Release --no-build
